services:
  postgres:
    image: postgres:16-alpine
    container_name: ezpaper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ezpaper
      POSTGRES_USER: ezpaper
      POSTGRES_PASSWORD: ezpaper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ezpaper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
